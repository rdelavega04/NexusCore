<p-card styleClass="dashboard-card">
  <ng-template pTemplate="title">Customers</ng-template>
  <ng-template pTemplate="subtitle">Manage and review customer records</ng-template>

  <ng-template pTemplate="content">
    <div class="table-toolbar">
      <span class="p-input-icon-left search">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          placeholder="Search customers..."
          [ngModel]="globalFilterValue"
          (ngModelChange)="onGlobalFilter($event)"
        />
      </span>
      <div class="toolbar-right">
        <span class="meta">{{ customers.length }} total</span>
      </div>
    </div>

    <p-table
      #dt
      [value]="customers"
      [loading]="loading"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [globalFilterFields]="globalFilterFields"
      [sortMode]="'multiple'"
      dataKey="id"
      responsiveLayout="scroll"
      styleClass="customers-table"
    >
      <ng-template pTemplate="header">
        <tr>
          <th pSortableColumn="customerNumber">
            Customer #
            <p-sortIcon field="customerNumber"></p-sortIcon>
          </th>
          <th pSortableColumn="lastName">
            Name
            <p-sortIcon field="lastName"></p-sortIcon>
          </th>
          <th pSortableColumn="email">
            Email
            <p-sortIcon field="email"></p-sortIcon>
          </th>
          <th pSortableColumn="city">
            City
            <p-sortIcon field="city"></p-sortIcon>
          </th>
          <th pSortableColumn="state" style="width: 7rem">
            State
            <p-sortIcon field="state"></p-sortIcon>
          </th>
          <th pSortableColumn="zipcode" style="width: 8rem">
            Zip
            <p-sortIcon field="zipcode"></p-sortIcon>
          </th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-c>
        <tr>
          <td class="mono">{{ c.customerNumber }}</td>
          <td>
            <div class="name">
              <span class="primary">{{ c.firstName }} {{ c.lastName }}</span>
              <span class="secondary" *ngIf="c.address">{{ c.address }}</span>
            </div>
          </td>
          <td>{{ c.email || '—' }}</td>
          <td>{{ c.city || '—' }}</td>
          <td>
            <p-tag
              [value]="(c.state || '—')"
              severity="info"
              styleClass="state-tag"
            ></p-tag>
          </td>
          <td class="mono">{{ c.zipcode || '—' }}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="empty">No customers found.</td>
        </tr>
      </ng-template>
    </p-table>
  </ng-template>
</p-card>
